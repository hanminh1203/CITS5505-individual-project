<div id="question-{{id}}" class="question mb-3">
    <div class="question-header mb-1">
        <div class="mb-1 question-number">Question {{number}} of {{questionCount}}</div>
        <div class="mb-0 question-text">{{question}}</div>
    </div>
    <div class="feedback ms-2 mb-4"></div>
    <div class="question-options">
        {{options}}
    </div>
</div>
