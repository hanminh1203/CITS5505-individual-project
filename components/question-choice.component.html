<div class="form-check">
    <input class="form-check-input" type="radio" id="answer-{{questionId}}-{{index}}" app-question-id="{{questionId}}" app-answer="{{index}}"
        name="question-{{questionId}}" value="{{index}}">
    <label class="form-check-label" for="answer-{{questionId}}-{{index}}">{{option}}</label>
</div>
