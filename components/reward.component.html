<div class="modal fade" id="reward-popup" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
    aria-labelledby="reward-popup-label" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="reward-popup-label">Your reward</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="reward-popup-image-success" class="d-block">
                    <img id="reward-image" class="img-thumbnail" alt="Failed to load reward image">
                    <div>
                        Congratulations! You earn yourself a picture of gorgeous gourmet cuisine.
                    </div>
                </div>
                <div id="reward-popup-image-failed" class="d-none">
                    Failed to load reward image
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal" >Great</button>
            </div>
        </div>
    </div>
</div>
