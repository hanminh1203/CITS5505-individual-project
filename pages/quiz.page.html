<div class="container p-4">
    <div class="text-center">
        <h1>Quiz</h1>
        <div>
            Pick your answers and see how you go! Get at least 7 right answer to win a reward.
        </div>
    </div>
    <form id="quiz-container">
    </form>
    <div class="control text-center">
        <button id="btn-submit" class="btn btn-primary">Submit Quiz</button>
    </div>
    <div class="row justify-content-center">
        <div id="results-container" class="mt-4 d-none text-center container">
            <h3 class="mb-3">Quiz Results</h3>
            <div class="table-responsive">
                <table class="table table-bordered table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th class="w-25">Date</th>
                            <th class="w-25">Score</th>
                            <th class="w-25">Percentage</th>
                            <th class="w-25">Passed/Failed</th>
                        </tr>
                    </thead>
                    <tbody id="results-list">
                    </tbody>
                </table>
            </div>
            <div class="results-controls mt-3">
                <button id="btn-clear-results" class="btn btn-danger">Clear Results</button>
                <button id="btn-reset" class="btn btn-secondary">Reload Quiz</button>
                <a id="btn-reset" class="btn btn-dark" href="#">Back to tutorial</a>
            </div>
        </div>
    </div>
</div>
